name: Build executables

on:
  push:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish as a GitHub Release (leave blank to only build artifacts)"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov numpy pypdf

      - name: Run tests
        run: pytest -q --cov=llm_detector --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Python backend ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[bundle]"

      - name: Build Python backend executable
        run: pyinstaller llm_detector.spec --noconfirm --clean --distpath dist_single
        env:
          ONEFILE: "1"

      - name: Verify Python executable
        shell: pwsh
        run: |
          if (-not (Test-Path dist_single/llm-detector.exe)) { Write-Error "Python build failed"; exit 1 }
          Get-Item dist_single/llm-detector.exe

      # ── React GUI + Electron desktop app ────────────────────────────
      - name: Install GUI dependencies
        working-directory: beet/gui
        run: npm ci

      - name: Install Electron dependencies
        working-directory: beet/electron
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Build and package desktop app
        working-directory: beet/electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: BEET-Setup-Windows
          path: beet/electron/release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: BEET-Setup-Windows
          path: windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: windows/*.exe
          generate_release_notes: true
