name: Build executables

on:
  push:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish as a GitHub Release (leave blank to only build artifacts)"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov numpy pypdf

      - name: Run tests
        run: pytest -q --cov=llm_detector --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: llm-detector-windows-x86_64
            binary: llm-detector.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[bundle]"

      - name: Build single-file executable
        run: pyinstaller llm_detector.spec --noconfirm --clean
        env:
          ONEFILE: "1"

      - name: Verify executable exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path dist/llm-detector.exe)) { Write-Error "Build failed"; exit 1 }
          Get-Item dist/llm-detector.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-detector-windows-x86_64
          path: windows/

      - name: Rename Windows executable for release
        run: |
          cp windows/llm-detector.exe  llm-detector-windows-x86_64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            llm-detector-windows-x86_64.exe
          generate_release_notes: true
